version: '3.8'

services:
  frontend:
    image: nandini965/frontend-expence:latest
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    image: nandini965/backend-expence:latest
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: expense  # ✅ Fixed spelling
      DB_PASSWORD: ExpenseApp@1
      DB_NAME: transactions
    depends_on:
      -mysql-db:
         condition: service_healthy

  mysql-db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: ExpenseApp@1
      MYSQL_DATABASE: transactions  # ✅ Added database name
      MYSQL_USER: expense  # ✅ Fixed spelling
      MYSQL_PASSWORD: ExpenseApp@1  # ✅ Fixed password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
